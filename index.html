<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RCA Wizard Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8fafc;
      scroll-behavior: smooth;
    }
    /* Theme the numeric input counters */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type=number] {
      -moz-appearance: textfield;
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #e2e8f0;
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #cbd5e1;
    }
    /* docx-preview styles override */
    .docx-wrapper {
      background-color: transparent !important;
      padding: 0 !important;
    }
    .docx {
      box-shadow: 0 40px 80px rgba(0,0,0,0.12) !important;
      margin-bottom: 40px !important;
    }

    /* Professional Print Engine Styles */
    @media print {
      body {
        background-color: white !important;
        margin: 0 !important;
        padding: 0 !important;
        color: #000 !important;
      }
      .no-print {
        display: none !important;
      }
      .print-only {
        display: block !important;
      }
      .page-break-avoid {
        break-inside: avoid !important;
        page-break-inside: avoid !important;
      }
      @page {
        size: A4;
        margin: 15mm;
      }
      .print-card {
        border: 1px solid #e2e8f0 !important;
        border-radius: 0 !important;
        margin-bottom: 20px !important;
        padding: 15px !important;
        box-shadow: none !important;
      }
      table {
        width: 100% !important;
        border-collapse: collapse !important;
      }
      th, td {
        border: 1px solid #f1f5f9 !important;
        padding: 8px !important;
      }
      .bg-slate-900 {
        background-color: #0f172a !important;
        color: white !important;
        -webkit-print-color-adjust: exact;
      }
      .text-blue-600 { color: #2563eb !important; }
      .text-emerald-600 { color: #059669 !important; }
      .text-slate-400 { color: #94a3b8 !important; }
    }
    .print-only {
      display: none;
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "mammoth": "https://esm.sh/mammoth@^1.6.0",
    "docx-preview": "https://esm.sh/docx-preview@^0.1.15"
  }
}
</script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
